<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BuildWorld - Creative Sandbox</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; background:#1a1a2e; color:#fff; touch-action:none; user-select:none; -webkit-user-select:none; }

/* Start Screen */
#startScreen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; background:linear-gradient(135deg,#0f0c29,#302b63,#24243e); }
#startScreen h1 { font-size:3em; margin-bottom:0.2em; animation:floatTitle 3s ease-in-out infinite; }
@keyframes floatTitle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
#startScreen .subtitle { color:#aaa; margin-bottom:2em; font-size:1.1em; }
#startScreen button { padding:14px 48px; font-size:1.2em; border:none; border-radius:12px; cursor:pointer; margin:8px; transition:transform .2s,box-shadow .2s; }
#startScreen button:hover { transform:scale(1.05); }
.btn-play { background:linear-gradient(135deg,#6c5ce7,#a29bfe); color:#fff; }
.btn-load { background:linear-gradient(135deg,#00b894,#55efc4); color:#fff; }
.btn-clear { background:linear-gradient(135deg,#d63031,#ff7675); color:#fff; font-size:0.9em!important; padding:10px 30px!important; }

/* Game UI */
#gameUI { display:none; position:fixed; inset:0; z-index:10; pointer-events:none; }
#gameUI > * { pointer-events:auto; }

/* Top bar */
#topBar { position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:rgba(0,0,0,0.5); backdrop-filter:blur(8px); }
#topBar button { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.2); color:#fff; padding:6px 14px; border-radius:8px; cursor:pointer; font-size:0.9em; transition:background .2s; }
#topBar button:hover { background:rgba(255,255,255,0.3); }
#topBar button:disabled { opacity:0.4; cursor:default; }
#coordDisplay { font-size:0.85em; color:#aaa; }

/* Palette */
#palette { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(10px); border-top:1px solid rgba(255,255,255,0.1); max-height:45vh; transition:max-height .3s; }
#palette.collapsed { max-height:40px; }
#paletteHeader { display:flex; align-items:center; padding:6px 12px; cursor:pointer; }
#paletteHeader h3 { flex:1; font-size:0.95em; }
#categoryTabs { display:flex; gap:4px; padding:4px 12px; overflow-x:auto; scrollbar-width:none; }
#categoryTabs::-webkit-scrollbar { display:none; }
.cat-tab { padding:4px 12px; border-radius:16px; background:rgba(255,255,255,0.1); border:none; color:#ccc; cursor:pointer; font-size:0.8em; white-space:nowrap; transition:all .2s; }
.cat-tab.active { background:#6c5ce7; color:#fff; }
#blockGrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(52px,1fr)); gap:4px; padding:8px 12px; max-height:32vh; overflow-y:auto; scrollbar-width:thin; }
.block-item { width:48px; height:48px; display:flex; align-items:center; justify-content:center; font-size:1.6em; border-radius:8px; cursor:pointer; border:2px solid transparent; transition:all .15s; position:relative; background:rgba(255,255,255,0.05); }
.block-item:hover { background:rgba(255,255,255,0.15); transform:scale(1.1); }
.block-item.selected { border-color:#6c5ce7; background:rgba(108,92,231,0.2); box-shadow:0 0 10px rgba(108,92,231,0.5); }
.block-item .tooltip { position:absolute; bottom:100%; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:2px 8px; border-radius:4px; font-size:0.6em; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity .2s; }
.block-item:hover .tooltip { opacity:1; }

/* Minimap */
#minimap { position:absolute; top:50px; right:10px; width:140px; height:140px; border:2px solid rgba(255,255,255,0.3); border-radius:8px; overflow:hidden; background:rgba(0,0,0,0.5); }
#minimapCanvas { width:100%; height:100%; }

/* Day/Night toggle */
#dayNightBtn { position:absolute; top:50px; left:10px; width:44px; height:44px; border-radius:50%; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.2); font-size:1.4em; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .3s; }

/* Canvas */
#gameCanvas { display:block; width:100%; height:100%; }

/* Placement animation */
@keyframes blockPopIn { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.3)} 100%{transform:scale(1);opacity:1} }
@keyframes blockDestroy { 0%{transform:scale(1);opacity:1} 100%{transform:scale(0);opacity:0} }
.pop-in { animation:blockPopIn .25s ease-out; }
.pop-out { animation:blockDestroy .2s ease-in forwards; }

/* Particles */
@keyframes particleFly { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--px),var(--py)) scale(0);opacity:0} }
.particle { position:absolute; width:6px; height:6px; border-radius:50%; pointer-events:none; animation:particleFly .5s ease-out forwards; }

/* Day/night transition */
.day-mode { transition:background-color 2s ease; }
.night-mode { transition:background-color 2s ease; }

/* Save indicator */
#saveIndicator { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.8); color:#00b894; padding:10px 24px; border-radius:8px; font-size:1em; opacity:0; transition:opacity .3s; pointer-events:none; }
#saveIndicator.show { opacity:1; }

/* Responsive */
@media(max-width:600px) {
  #startScreen h1 { font-size:2em; }
  .block-item { width:42px; height:42px; font-size:1.3em; }
  #minimap { width:100px; height:100px; }
}
</style>
</head>
<body>
<!-- Start Screen -->
<div id="startScreen">
  <h1>🏗️ BuildWorld</h1>
  <p class="subtitle">Create your own world, block by block</p>
  <button class="btn-play" onclick="startGame(false)">🎮 New World</button>
  <button class="btn-load" onclick="startGame(true)">📂 Load World</button>
  <button class="btn-clear" onclick="clearSave()">🗑️ Clear Save</button>
</div>

<!-- Game -->
<canvas id="gameCanvas"></canvas>
<div id="gameUI">

    <span id="coordDisplay">0, 0</span>
    <div style="display:flex;gap:6px;">
      <button onclick="saveWorld()">💾 Save</button>
      <button onclick="goToStart()">🏠 Menu</button>
    </div>
  </div>
  <button id="dayNightBtn" onclick="toggleDayNight()">🌞</button>
  <div id="minimap"><canvas id="minimapCanvas" width="140" height="140"></canvas></div>
  <div id="saveIndicator">✅ World Saved!</div>
  <div id="palette">
    <div id="paletteHeader" onclick="togglePalette()">

      <span id="paletteToggle">▼</span>

const CATS = [...new Set(BLOCKS.map(b=>b.cat))];

// ===== GAME STATE =====
const CELL = 32;
const WORLD_W = 200, WORLD_H = 200;
let world = {}; // key: "x,y" -> blockId
let camera = {x:0, y:0};
let selectedBlock = 0;
let isNight = false;
let undoStack = [];
let redoStack = [];
let gameStarted = false;
let paletteCollapsed = false;
let activeCat = CATS[0];

// Touch/pointer state
let isDragging = false;
let isPlacing = false;
let lastTouch = null;
let lastPlacedKey = null;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const miniCanvas = document.getElementById('minimapCanvas');
const miniCtx = miniCanvas.getContext('2d');

// ===== INITIALIZATION =====
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function startGame(load) {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameUI').style.display = 'block';
  if (load) loadWorld();
  else { world = {}; camera = {x:-(WORLD_W*CELL)/2 + canvas.width/2, y:-(WORLD_H*CELL)/2 + canvas.height/2}; }
  gameStarted = true;
  buildPalette();
  requestAnimationFrame(gameLoop);
}

function goToStart() {
  document.getElementById('startScreen').style.display = 'flex';
  document.getElementById('gameUI').style.display = 'none';
  gameStarted = false;
}

function clearSave() {
  localStorage.removeItem('buildworld_save');
  showIndicator('🗑️ Save Cleared!');
}

// ===== PALETTE =====
function buildPalette() {
  const tabsEl = document.getElementById('categoryTabs');
  const gridEl = document.getElementById('blockGrid');
  tabsEl.innerHTML = '';
  CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (cat === activeCat ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { activeCat = cat; buildPalette(); };
    tabsEl.appendChild(btn);
  });
  gridEl.innerHTML = '';
  BLOCKS.filter(b => b.cat === activeCat).forEach(b => {
    const div = document.createElement('div');
    div.className = 'block-item' + (b.id === selectedBlock ? ' selected' : '');
    div.innerHTML = `<span>${b.emoji}</span><span class="tooltip">${b.name}</span>`;
    div.onclick = () => { selectedBlock = b.id; buildPalette(); };
    gridEl.appendChild(div);
  });
}

function togglePalette() {
  paletteCollapsed = !paletteCollapsed;
  document.getElementById('palette').classList.toggle('collapsed', paletteCollapsed);
  document.getElementById('paletteToggle').textContent = paletteCollapsed ? '▲' : '▼';
}

// ===== WORLD OPERATIONS =====
function getBlock(x, y) { return world[x+','+y]; }
function setBlock(x, y, id) {
  const key = x+','+y;
  const prev = world[key];
  if (id === 99) { // eraser
    if (prev !== undefined) {
      undoStack.push({x,y,from:prev,to:undefined});
      redoStack = [];
      delete world[key];
      spawnParticles(x, y, BLOCKS[prev]?.color || '#fff');
    }
  } else {
    undoStack.push({x,y,from:prev,to:id});
    redoStack = [];
    world[key] = id;
  }
}

function undo() {
  if (!undoStack.length) return;
  const a = undoStack.pop();
  redoStack.push(a);
  if (a.from === undefined) delete world[a.x+','+a.y];
  else world[a.x+','+a.y] = a.from;
  updateUndoRedoBtns();
}

function redo() {
  if (!redoStack.length) return;
  const a = redoStack.pop();
  undoStack.push(a);
  if (a.to === undefined) delete world[a.x+','+a.y];
  else world[a.x+','+a.y] = a.to;
  updateUndoRedoBtns();
}

function updateUndoRedoBtns() {
  document.getElementById('undoBtn').disabled = !undoStack.length;
}

// ===== PARTICLES =====
const particles = [];
function spawnParticles(wx, wy, color) {
  const sx = wx * CELL + camera.x + CELL/2;
  const sy = wy * CELL + camera.y + CELL/2;
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left:${sx}px;top:${sy}px;background:${color};--px:${(Math.random()-0.5)*60}px;--py:${(Math.random()-0.5)*60}px;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 500);
  }
}

// ===== DAY/NIGHT =====
function toggleDayNight() {
  isNight = !isNight;
  document.getElementById('dayNightBtn').textContent = isNight ? '🌙' : '🌞';
}

// ===== SAVE/LOAD =====
function saveWorld() {
  const data = {world, camera, selectedBlock, isNight};
  localStorage.setItem('buildworld_save', JSON.stringify(data));
  showIndicator('✅ World Saved!');
}

function loadWorld() {
  try {
    const d = JSON.parse(localStorage.getItem('buildworld_save'));
    if (d) {
      world = d.world || {};
      camera = d.camera || {x:0,y:0};
      selectedBlock = d.selectedBlock || 0;
      isNight = !!d.isNight;
      document.getElementById('dayNightBtn').textContent = isNight ? '🌙' : '🌞';
    }
  } catch(e) {}
}

function showIndicator(text) {
  const el = document.getElementById('saveIndicator');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

// ===== INPUT =====
function screenToWorld(sx, sy) {
  return { x: Math.floor((sx - camera.x) / CELL), y: Math.floor((sy - camera.y) / CELL) };
}

function handlePointerDown(e) {
  if (!gameStarted) return;
  const t = e.touches ? e.touches[0] : e;
  // Check if touching palette area
  if (t.clientY > window.innerHeight * 0.55) return;
  isDragging = true;
  isPlacing = true;
  lastTouch = {x:t.clientX, y:t.clientY};
  lastPlacedKey = null;
  const w = screenToWorld(t.clientX, t.clientY);
  setBlock(w.x, w.y, selectedBlock);
  lastPlacedKey = w.x+','+w.y;
  updateUndoRedoBtns();
}

function handlePointerMove(e) {
  if (!gameStarted || !isDragging) return;
  const t = e.touches ? e.touches[0] : e;
  const dx = t.clientX - lastTouch.x;
  const dy = t.clientY - lastTouch.y;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (dist > 5) {
    // Camera pan mode (two fingers or if we detect movement before placing)
    camera.x += dx;
    camera.y += dy;
    lastTouch = {x:t.clientX, y:t.clientY};
  } else {
    // Place block on drag
    const w = screenToWorld(t.clientX, t.clientY);
    const key = w.x+','+w.y;
    if (key !== lastPlacedKey) {
      setBlock(w.x, w.y, selectedBlock);
      lastPlacedKey = key;
    }
  }
}

function handlePointerUp() {
  isDragging = false;
  isPlacing = false;
  lastPlacedKey = null;
  updateUndoRedoBtns();
}

canvas.addEventListener('pointerdown', handlePointerDown);
canvas.addEventListener('pointermove', handlePointerMove);
canvas.addEventListener('pointerup', handlePointerUp);
canvas.addEventListener('pointerleave', handlePointerUp);
canvas.addEventListener('touchstart', e => { e.preventDefault(); handlePointerDown(e); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); handlePointerMove(e); }, {passive:false});
canvas.addEventListener('touchend', e => { e.preventDefault(); handlePointerUp(e); }, {passive:false});

// Mouse wheel zoom could be added here
canvas.addEventListener('wheel', e => {
  // Pan with mouse wheel
  camera.x -= e.deltaX;
  camera.y -= e.deltaY;
  e.preventDefault();
}, {passive:false});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveWorld(); }
  if (e.key === 'n') toggleDayNight();
});

// ===== RENDERING =====
function drawGrid() {
  const startX = Math.floor(-camera.x / CELL);
  const startY = Math.floor(-camera.y / CELL);
  const endX = startX + Math.ceil(canvas.width / CELL) + 2;
  const endY = startY + Math.ceil(canvas.height / CELL) + 2;

  // Background
  const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  if (isNight) {
    skyGrad.addColorStop(0, '#0a0a2e');
    skyGrad.addColorStop(1, '#1a1a3e');
  } else {
    skyGrad.addColorStop(0, '#87CEEB');
    skyGrad.addColorStop(1, '#e0f0ff');
  }
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines (subtle)
  ctx.strokeStyle = isNight ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.08)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  for (let x = startX; x <= endX; x++) {
    const sx = x * CELL + camera.x;
    ctx.moveTo(sx, 0);
    ctx.lineTo(sx, canvas.height);
  }
  for (let y = startY; y <= endY; y++) {
    const sy = y * CELL + camera.y;
    ctx.moveTo(0, sy);
    ctx.lineTo(canvas.width, sy);
  }
  ctx.stroke();

  // World boundary
  ctx.strokeStyle = 'rgba(255,100,100,0.3)';
  ctx.lineWidth = 2;
  ctx.strokeRect(camera.x, camera.y, WORLD_W * CELL, WORLD_H * CELL);

  // Blocks
  for (let x = startX; x <= endX; x++) {
    for (let y = startY; y <= endY; y++) {
      const bid = getBlock(x, y);
      if (bid === undefined) continue;
      const b = BLOCKS[bid];
      if (!b) continue;
      const sx = x * CELL + camera.x;
      const sy = y * CELL + camera.y;

      // Block background
      ctx.fillStyle = b.color;
      ctx.globalAlpha = 0.4;
      ctx.fillRect(sx + 1, sy + 1, CELL - 2, CELL - 2);
      ctx.globalAlpha = 1;

      // Emoji
      ctx.font = `${CELL * 0.7}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(b.emoji, sx + CELL/2, sy + CELL/2 + 1);

      // Night overlay
      if (isNight) {
        ctx.fillStyle = 'rgba(0,0,40,0.3)';
        ctx.fillRect(sx + 1, sy + 1, CELL - 2, CELL - 2);
      }
    }
  }

  // Ghost preview at cursor
  if (selectedBlock !== undefined && selectedBlock !== 99) {
    // Could add hover preview here
  }
}

function drawMinimap() {
  const mw = 140, mh = 140;
  miniCtx.clearRect(0, 0, mw, mh);

  // Background
  miniCtx.fillStyle = isNight ? '#0a0a2e' : '#87CEEB';
  miniCtx.fillRect(0, 0, mw, mh);

  // Scale
  const sx = mw / WORLD_W;
  const sy = mh / WORLD_H;

  // Draw blocks (sample every few)
  const step = Math.max(1, Math.floor(WORLD_W / 50));
  for (let x = 0; x < WORLD_W; x += step) {
    for (let y = 0; y < WORLD_H; y += step) {
      const bid = getBlock(x, y);
      if (bid === undefined) continue;
      const b = BLOCKS[bid];
      if (!b) continue;
      miniCtx.fillStyle = b.color;
      miniCtx.fillRect(x * sx, y * sy, Math.max(1, step * sx), Math.max(1, step * sy));
    }
  }

  // Camera viewport
  const vx = (-camera.x / CELL) * sx;
  const vy = (-camera.y / CELL) * sy;
  const vw = (canvas.width / CELL) * sx;
  const vh = (canvas.height / CELL) * sy;
  miniCtx.strokeStyle = '#fff';
  miniCtx.lineWidth = 1.5;
  miniCtx.strokeRect(vx, vy, vw, vh);
}

// ===== COORDINATE DISPLAY =====
function updateCoords() {
  const cx = Math.floor((-camera.x + canvas.width/2) / CELL);
  const cy = Math.floor((-camera.y + canvas.height/2) / CELL);
  document.getElementById('coordDisplay').textContent = `${cx}, ${cy}`;
}

// ===== GAME LOOP =====
let lastTime = 0;
function gameLoop(time) {
  if (!gameStarted) return;
  const dt = time - lastTime;
  lastTime = time;

  drawGrid();
  drawMinimap();
  updateCoords();

  requestAnimationFrame(gameLoop);
}

// ===== INITIAL SETUP =====
buildPalette();
</script>
</body>
