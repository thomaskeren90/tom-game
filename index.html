<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tom Games — 24 Games, Zero BS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#070B14;--card:rgba(255,255,255,.05);--border:rgba(255,255,255,.1);--text:#e8eaf0;--dim:rgba(255,255,255,.4)}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden}

/* BG */
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 60% 50% at 15% 30%,rgba(255,26,26,.08) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 85% 20%,rgba(0,102,255,.07) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 85%,rgba(0,221,255,.06) 0%,transparent 60%),
    var(--bg);pointer-events:none}

.wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 16px 60px}

/* HERO */
.hero{text-align:center;padding:52px 16px 36px}
.hero-logo{font-family:'Space Mono',monospace;font-size:clamp(2em,6vw,3.2em);font-weight:700;
  background:linear-gradient(135deg,#FF1A1A,#FF6600,#FFE600,#00FF88,#00DDFF,#CC00FF,#FF1A1A);
  background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shift 5s ease infinite;letter-spacing:.04em}
@keyframes shift{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
.hero-sub{color:var(--dim);font-size:.9em;margin:8px 0 6px;letter-spacing:.04em}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:5px 14px;font-size:.75em;
  color:rgba(255,255,255,.5);margin-top:10px}

/* STATS ROW */
.stats{display:flex;justify-content:center;gap:12px;margin:24px 0 32px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:14px;
  padding:12px 20px;text-align:center;min-width:90px}
.stat-n{font-family:'Space Mono',monospace;font-size:1.5em;font-weight:700;
  background:linear-gradient(135deg,#FF1A1A,#FF6600);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-l{font-size:.62em;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;margin-top:2px}

/* SECTION */
.section{margin-bottom:36px}
.section-title{font-size:.72em;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.3);
  margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(280px,100%),1fr));gap:12px}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:18px 16px;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:8px;
  transition:transform .22s cubic-bezier(.34,1.4,.64,1),box-shadow .22s,border-color .22s;
  position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04),transparent);opacity:0;transition:opacity .2s}
.card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.22);box-shadow:0 12px 36px rgba(0,0,0,.4)}
.card:hover::before{opacity:1}
.card:active{transform:scale(.97)}

.card-top{display:flex;align-items:flex-start;gap:12px}
.card-ico{font-size:2.2em;flex-shrink:0;line-height:1}
.card-info{flex:1;min-width:0}
.card-name{font-size:1em;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-desc{font-size:.74em;color:var(--dim);line-height:1.4;margin-top:3px}
.card-tag{display:inline-block;font-size:.58em;letter-spacing:.12em;text-transform:uppercase;
  padding:2px 8px;border-radius:8px;font-weight:800;margin-top:6px;align-self:flex-start}

/* Tag colors */
.tag-puzzle{background:rgba(108,92,231,.2);color:#a29bfe;border:1px solid rgba(108,92,231,.3)}
.tag-arcade{background:rgba(255,26,26,.15);color:#ff7675;border:1px solid rgba(255,26,26,.3)}
.tag-idle{background:rgba(0,184,148,.15);color:#55efc4;border:1px solid rgba(0,184,148,.3)}
.tag-brain{background:rgba(253,203,110,.15);color:#fdcb6e;border:1px solid rgba(253,203,110,.3)}
.tag-board{background:rgba(0,206,201,.15);color:#00cec9;border:1px solid rgba(0,206,201,.3)}
.tag-runner{background:rgba(255,118,117,.15);color:#ff7675;border:1px solid rgba(255,118,117,.3)}
.tag-sort{background:rgba(116,185,255,.15);color:#74b9ff;border:1px solid rgba(116,185,255,.3)}
.tag-shooter{background:rgba(232,67,147,.15);color:#fd79a8;border:1px solid rgba(232,67,147,.3)}
.tag-word{background:rgba(129,236,236,.15);color:#81ecec;border:1px solid rgba(129,236,236,.3)}
.tag-action{background:rgba(255,159,10,.15);color:#FF9F0A;border:1px solid rgba(255,159,10,.3)}
.tag-strategy{background:rgba(191,90,242,.15);color:#BF5AF2;border:1px solid rgba(191,90,242,.3)}
.tag-sandbox{background:rgba(48,209,88,.15);color:#30D158;border:1px solid rgba(48,209,88,.3)}
.tag-sports{background:rgba(90,200,250,.15);color:#5AC8FA;border:1px solid rgba(90,200,250,.3)}

/* PLAY BTN */
.card-play{margin-top:auto;padding-top:10px;border-top:1px solid rgba(255,255,255,.07);
  font-size:.72em;color:rgba(255,255,255,.35);display:flex;align-items:center;justify-content:space-between}
.card-play span{color:rgba(255,255,255,.6);font-weight:800}

/* FOOTER */
footer{text-align:center;padding:32px 16px;border-top:1px solid rgba(255,255,255,.06);
  color:rgba(255,255,255,.25);font-size:.78em;line-height:1.8}
footer a{color:rgba(255,255,255,.4);text-decoration:none}
footer a:hover{color:rgba(255,255,255,.7)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:24px}
#search{width:100%;padding:12px 16px 12px 40px;background:rgba(255,255,255,.05);
  border:1px solid var(--border);border-radius:12px;color:#fff;font-size:.9em;
  font-family:'Nunito',sans-serif;font-weight:700;outline:none;transition:border-color .2s}
#search::placeholder{color:rgba(255,255,255,.25)}
#search:focus{border-color:rgba(108,92,231,.6)}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:1.1em;pointer-events:none}

/* RESPONSIVE */
@media(max-width:480px){
  .hero-logo{font-size:1.8em}
  .stats{gap:8px}.stat{padding:10px 14px;min-width:75px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-logo">🎮 TOM GAMES</div>
    <div class="hero-sub">Pure HTML5 • Works anywhere • Zero ads • No paywall</div>
    <div class="hero-badge">🇮🇩 Made with ❤️ in Jakarta</div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><div class="stat-n">24</div><div class="stat-l">Games</div></div>
    <div class="stat"><div class="stat-n">0</div><div class="stat-l">Ads</div></div>
    <div class="stat"><div class="stat-n">∞</div><div class="stat-l">Free</div></div>
    <div class="stat"><div class="stat-n">5s</div><div class="stat-l">Load time</div></div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input type="text" id="search" placeholder="Cari game..." oninput="filterGames(this.value)">
  </div>

  <!-- INDONESIAN GAMES -->
  <div class="section">
    <div class="section-title">🇮🇩 Indonesian Originals</div>
    <div class="grid" id="grid-id"></div>
  </div>

  <!-- ENGLISH GAMES -->
  <div class="section">
    <div class="section-title">🌐 English Games</div>
    <div class="grid" id="grid-en"></div>
  </div>

</div>

<footer>
  <div>Made by <a href="https://github.com/thomaskeren90" target="_blank">thomaskeren90</a> • Jakarta, Indonesia</div>
  <div>All games are free, offline-capable, and ad-free forever.</div>
  <div style="margin-top:8px"><a href="https://github.com/thomaskeren90/tom-game" target="_blank">⭐ GitHub Repository</a></div>
</footer>

<script>
const GAMES = [
  // Indonesian
  {file:'air-warna.html',    ico:'🧪', name:'Air Warna',       desc:'Urutkan warna ke dalam botol. Tuang sampai setiap botol satu warna.',                tag:'sort',    lang:'id'},
  {file:'blok-susun.html',   ico:'🧊', name:'Blok Susun',      desc:'Puzzle blok 8×8. Susun baris & kolom, raih skor. Kota Indonesia progression.',      tag:'puzzle',  lang:'id'},
  {file:'flappy-tap.html',   ico:'🐦', name:'Flappy Tap',      desc:'Terbang melewati landmark Indonesia. Endless arcade yang adiktif.',                   tag:'arcade',  lang:'id'},
  {file:'gelembung.html',    ico:'🫧', name:'Gelembung',        desc:'Bubble shooter dengan fisika akurat. Tema Indonesia. Tanpa timer paksa.',             tag:'shooter', lang:'id'},
  {file:'gem-match.html',    ico:'💎', name:'Gem Match',        desc:'Match-3 dengan motif batik. Tanpa lives, tanpa paywall.',                             tag:'puzzle',  lang:'id'},
  {file:'kata-kita.html',    ico:'📝', name:'Kata Kita',        desc:'Puzzle kata bilingual EN/ID. Daily puzzles + mode blitz.',                            tag:'word',    lang:'id'},
  {file:'kuis_nusantara.html',ico:'🗺️',name:'Kuis Nusantara',  desc:'Quiz pengetahuan tentang Indonesia. Provinsi, budaya, sejarah.',                     tag:'brain',   lang:'id'},
  {file:'lari-kreta.html',   ico:'🏃', name:'Lari Kreta',       desc:'Endless runner kabur dari banjir Jakarta. Zona berubah terus.',                       tag:'runner',  lang:'id'},
  {file:'nomer-2048.html',   ico:'🔢', name:'Nomer 2048',       desc:'Geser tile Rupiah. Puzzle klasik dengan sentuhan Indonesia.',                         tag:'brain',   lang:'id'},
  {file:'tahu-bulat.html',   ico:'🟡', name:'Tahu Bulat Tycoon',desc:'Idle clicker. Jual tahu goreng, bangun kerajaan kuliner jalanan.',                   tag:'idle',    lang:'id'},
  {file:'tumpuk_tinggi.html',ico:'🏗️', name:'Tumpuk Tinggi',   desc:'Susun blok setinggi mungkin tanpa jatuh. Fisika realistis.',                         tag:'arcade',  lang:'id'},
  {file:'ular-tangga.html',  ico:'🎲', name:'Ular Tangga',      desc:'Ular & Tangga dengan power-up modern. Strategi bertemu nostalgia.',                  tag:'board',   lang:'id'},
  // English
  {file:'block-crunch.html', ico:'⬡',  name:'Block Crunch',     desc:'3D isometric Tetris. 4 modes, combo system, neon visuals, full sound FX.',           tag:'puzzle',  lang:'en'},
  {file:'buildworld.html',   ico:'🏗️', name:'BuildWorld',        desc:'Creative sandbox. Place 70+ emoji blocks, build your world, save & load.',           tag:'sandbox', lang:'en'},
  {file:'cue-master.html',   ico:'🎱', name:'Cue Master',        desc:'Pool / billiards game with realistic physics and multiple levels.',                   tag:'sports',  lang:'en'},
  {file:'drop-zone.html',    ico:'💣', name:'Drop Zone',         desc:'Drop bombs strategically to clear targets. Puzzle meets action.',                    tag:'action',  lang:'en'},
  {file:'firestorm-lite.html',ico:'🔥',name:'Firestorm Lite',    desc:'Fast-paced shooter. Survive waves of enemies, upgrade your weapons.',                tag:'action',  lang:'en'},
  {file:'goal-rush.html',    ico:'⚽', name:'Goal Rush',         desc:'Football penalty shoot-out. Time your shots, read the keeper.',                      tag:'sports',  lang:'en'},
  {file:'lane-legends.html', ico:'🚗', name:'Lane Legends',      desc:'Endless lane-changer. Dodge traffic, collect power-ups, beat your best.',            tag:'runner',  lang:'en'},
  {file:'ludo-arena.html',   ico:'🎯', name:'Ludo Arena',        desc:'Classic Ludo with modern UI. Play solo or against AI opponents.',                    tag:'board',   lang:'en'},
  {file:'metro-dash.html',   ico:'🚇', name:'Metro Dash',        desc:'Sprint through metro stations. Avoid obstacles, catch your train.',                  tag:'runner',  lang:'en'},
  {file:'sugar-rush.html',   ico:'🍬', name:'Sugar Rush',        desc:'Sweet match puzzle. Chain combos, clear levels, satisfy your sugar craving.',        tag:'puzzle',  lang:'en'},
  {file:'zombie_shooter.html',ico:'🧟',name:'Zombie Shooter',    desc:'Top-down zombie survival. Aim, shoot, survive as long as you can.',                  tag:'action',  lang:'en'},
  {file:'index.html',        ico:'🏠', name:'(This page)',       desc:'You are here.',                                                                       tag:'',        lang:'skip'},
];

function makeCard(g){
  if(g.lang==='skip') return '';
  return `
    <a class="card" href="${g.file}">
      <div class="card-top">
        <div class="card-ico">${g.ico}</div>
        <div class="card-info">
          <div class="card-name">${g.name}</div>
          <div class="card-desc">${g.desc}</div>
          ${g.tag?`<span class="card-tag tag-${g.tag}">${g.tag.toUpperCase()}</span>`:''}
        </div>
      </div>
      <div class="card-play">
        <span>Tap to play</span>
        <span>▶</span>
      </div>
    </a>`;
}

function render(filter=''){
  const q=filter.toLowerCase();
  const id=GAMES.filter(g=>g.lang==='id'&&(g.name.toLowerCase().includes(q)||g.desc.toLowerCase().includes(q)));
  const en=GAMES.filter(g=>g.lang==='en'&&(g.name.toLowerCase().includes(q)||g.desc.toLowerCase().includes(q)));
  document.getElementById('grid-id').innerHTML=id.map(makeCard).join('');
  document.getElementById('grid-en').innerHTML=en.map(makeCard).join('');
  // Hide empty sections
  document.querySelectorAll('.section').forEach((s,i)=>{
    const grid=s.querySelector('.grid');
    s.style.display=grid&&grid.innerHTML.trim()?'block':'none';
  });
}

function filterGames(q){render(q);}
render();
</script>
</body>
</html>
